name: Release — frontend

# Triggered on merge to main when app source changes.
# Builds the bundle, publishes a GitHub Release, then updates the cluster
# by setting APP_VERSION on the deployment — which triggers a rolling restart.
# Pods fetch the new bundle from GitHub Releases on startup via entrypoint.sh.

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/**"
  workflow_dispatch:

env:
  NAMESPACE: calypso
  DEPLOYMENT: frontend

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub Releases

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build application bundle
        working-directory: apps/frontend
        run: bun install --frozen-lockfile && bun run build

      - name: Package release artifact
        working-directory: apps/frontend
        run: tar -czf frontend-dist.tar.gz dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create frontend-${{ github.sha }} \
            --title "Frontend ${{ github.sha }}" \
            --notes "Automated release from commit ${{ github.sha }}" \
            apps/frontend/frontend-dist.tar.gz

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to cluster
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "${KUBE_CONFIG}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Changing APP_VERSION modifies the pod template, triggering
          # a rolling restart automatically.
          kubectl set env deployment/${DEPLOYMENT} \
            APP_VERSION=frontend-${{ github.sha }} \
            -n ${NAMESPACE}

          kubectl rollout status deployment/${DEPLOYMENT} \
            -n ${NAMESPACE} \
            --timeout=5m

      - name: Rollback on failure
        if: failure()
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "${KUBE_CONFIG}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl rollout undo deployment/${DEPLOYMENT} -n ${NAMESPACE}
          echo "Rolled back ${DEPLOYMENT} to previous revision."
          kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=3m
