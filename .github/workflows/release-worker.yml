name: Release — worker

# Triggered on merge to main when worker source changes.
# Builds the worker daemon bundle, layers it onto the existing base image,
# and rolls out to the cluster using the same pattern as release-frontend.

on:
  push:
    branches: [main]
    paths:
      - "apps/worker/**"
      - "packages/**"
  workflow_dispatch:
  workflow_call:

env:
  REGISTRY: ghcr.io
  BASE_IMAGE: ghcr.io/dot-matrix-labs/calypso/worker
  NAMESPACE: calypso
  DEPLOYMENT: worker

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Build worker bundle
        working-directory: apps/worker
        run: bun install --frozen-lockfile && bun run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/worker
          file: apps/worker/Dockerfile.release
          push: true
          build-args: |
            RELEASE_TAG=${{ github.sha }}
          tags: |
            ${{ env.BASE_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BASE_IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.BASE_IMAGE }}:latest
          cache-to: type=inline
          platforms: linux/amd64,linux/arm64

      - name: Deploy to cluster
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "${KUBE_CONFIG}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kubectl set image deployment/${DEPLOYMENT} \
            ${DEPLOYMENT}=${BASE_IMAGE}@${{ steps.build.outputs.digest }} \
            -n ${NAMESPACE}

          kubectl rollout status deployment/${DEPLOYMENT} \
            -n ${NAMESPACE} \
            --timeout=5m

      - name: Rollback on failure
        if: failure()
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "${KUBE_CONFIG}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl rollout undo deployment/${DEPLOYMENT} -n ${NAMESPACE}
          echo "Rolled back ${DEPLOYMENT} to previous revision."
          kubectl rollout status deployment/${DEPLOYMENT} -n ${NAMESPACE} --timeout=3m
