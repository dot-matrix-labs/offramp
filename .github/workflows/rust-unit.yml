name: Rust unit tests — cli

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  merge_group:
  schedule:
    - cron: "15 1 * * *"
  workflow_dispatch:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        # Tests are expected to pass on the current stable toolchain even while
        # quality/build compatibility is checked against a wider version range.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Run unit tests
        working-directory: cli
        run: cargo test-unit
