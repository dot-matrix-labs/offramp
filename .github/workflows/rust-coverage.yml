name: Rust coverage — cli

on:
  push:
    branches: [main]
    paths:
      - "cli/**"
      - ".github/workflows/rust-coverage.yml"
  pull_request:
    paths:
      - "cli/**"
      - ".github/workflows/rust-coverage.yml"
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Run coverage with 99% line threshold
        working-directory: cli
        run: |
          cargo llvm-cov --all-features --workspace --no-report
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --json --summary-only --output-path coverage-summary.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          summary = json.loads(Path("coverage-summary.json").read_text())
          for file_summary in summary["data"][0]["files"]:
              lines = file_summary["summary"]["lines"]
              if float(lines["percent"]) < 100.0:
                  print(
                      f"{file_summary['filename']}: "
                      f"{lines['covered']}/{lines['count']} lines "
                      f"({float(lines['percent']):.2f}%)"
                  )
          lines = summary["data"][0]["totals"]["lines"]
          percent = float(lines["percent"])
          print(f"Total line coverage: {percent:.2f}%")
          if percent < 100.0:
              raise SystemExit(f"line coverage below threshold: {percent:.2f}% < 100.00%")
          PY

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v6
        with:
          name: cli-coverage-lcov
          path: cli/lcov.info

      - name: Append coverage summary
        working-directory: cli
        shell: bash
        run: |
          echo "## CLI Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Enforced line coverage target: 99%" >> "$GITHUB_STEP_SUMMARY"
          echo "- LCOV artifact: cli-coverage-lcov" >> "$GITHUB_STEP_SUMMARY"
