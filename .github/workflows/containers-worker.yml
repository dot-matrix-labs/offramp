name: Base image — calypso/worker

# Rebuilds the base image when container-level dependencies change
# (bun version, Node version, vendor CLI binary versions, Dockerfile).
# Day-to-day releases go through release-worker.yml.
# After a base rebuild, triggers release-worker to re-layer the current
# worker bundle onto the new base and deploy.

on:
  push:
    branches: [main]
    paths:
      - "containers/worker/**"
  pull_request:
    paths:
      - "containers/worker/**"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/dot-matrix-labs/calypso/worker

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push base image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: containers/worker
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE }}:base-${{ github.sha }}
            ${{ env.IMAGE }}:base-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # NOTE: once apps/worker/ contains a built daemon, add a trigger-app-release job here
  # that chains to release-worker.yml (uses: ./.github/workflows/release-worker.yml)
  # so that a base image rebuild immediately re-layers the current worker bundle.
