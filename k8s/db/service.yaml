apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: calypso
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
  # ClusterIP only — postgres is never exposed outside the cluster.
  # Network policy further restricts which pods may connect (see network-policy.yaml).
  type: ClusterIP
