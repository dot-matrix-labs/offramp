name: Release — cli

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: calypso-cli-linux-x86_64
            binary_name: calypso-cli
          - os: macos-latest
            artifact_name: calypso-cli-macos-aarch64
            binary_name: calypso-cli

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Build release binary
        working-directory: cli
        run: cargo build --release

      - name: Package release artifact
        shell: bash
        run: |
          mkdir -p dist
          cp cli/target/release/${{ matrix.binary_name }} dist/${{ matrix.binary_name }}
          tar -czf dist/${{ matrix.artifact_name }}.tar.gz -C dist ${{ matrix.binary_name }}

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.tar.gz

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          shopt -s globstar
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Automated CLI release for ${GITHUB_REF_NAME}" \
            dist/**/*.tar.gz
