name: Rust integration tests — cli

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
  merge_group:
  schedule:
    - cron: "25 1 * * *"
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust
        # Integration coverage is expected to stay green on the current stable
        # toolchain even while quality/build compatibility spans older versions.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            cli -> target

      - name: Run integration tests
        working-directory: cli
        run: cargo test-integration
